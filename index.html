// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
let audioCtx=null,musicNodes=[],musicPlaying=false,musicTimeout=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq,dur,type='square',vol=0.12,delay=0){
  try{
    let ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime+delay);
    g.gain.setValueAtTime(0,ac.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
    o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+0.05);
  }catch(e){}
}
const SFX={
  jump:   ()=>{beep(260,0.06,'square',0.15);beep(380,0.08,'square',0.13,0.05);},
  coin:   ()=>{beep(988,0.05,'sine',0.2);beep(1319,0.12,'sine',0.18,0.05);},
  stomp:  ()=>{beep(150,0.05,'square',0.2);beep(100,0.08,'square',0.15,0.04);},
  hurt:   ()=>{beep(440,0.05,'sawtooth',0.15);beep(330,0.05,'sawtooth',0.13,0.05);beep(220,0.15,'sawtooth',0.1,0.1);},
  die:    ()=>{[440,415,392,370,349,330,311,294,277,262].forEach((f,i)=>beep(f,0.08,'sawtooth',0.13,i*0.06));},
  powerup:()=>{[262,330,392,523,659,784,1047].forEach((f,i)=>beep(f,0.1,'sine',0.18,i*0.05));},
  block:  ()=>{beep(220,0.04,'square',0.18);beep(180,0.06,'square',0.15,0.03);},
  smash:  ()=>{beep(150,0.04,'sawtooth',0.2);beep(120,0.08,'sawtooth',0.15,0.04);beep(90,0.1,'sawtooth',0.1,0.08);},
  flagpole:()=>{[523,659,784,1047,1319].forEach((f,i)=>beep(f,0.15,'sine',0.2,i*0.08));},
  levelclear:()=>{let s=[[523,0],[659,0.1],[784,0.2],[1047,0.3],[784,0.45],[1047,0.55]];s.forEach(([f,d])=>beep(f,0.18,'sine',0.2,d));},

};
const TEMPO=0.18;
const melody=[[659,1],[659,1],[0,1],[659,1],[0,1],[523,1],[659,1],[0,1],[784,2],[0,2],[392,2],[0,2],[523,2],[0,1],[392,2],[0,1],[330,2],[0,1],[440,1],[494,1],[466,1],[440,1],[392,1.5],[659,1.5],[784,1.5],[880,1.5],[698,1],[784,1],[0,1],[659,1],[523,1],[587,1],[494,1],[0,1],[523,2],[0,1],[392,2],[0,1],[330,2],[0,1],[440,1],[494,1],[466,1],[440,1],[392,1.5],[659,1.5],[784,1.5],[880,1.5],[698,1],[784,1],[0,1],[659,1],[523,1],[587,1],[494,1],[0,1]];
const bass=[[131,2],[0,2],[131,1],[0,1],[131,2],[0,1],[131,1],[131,2],[0,1],[131,1],[0,1],[98,2],[0,2],[110,2],[0,2],[131,2],[0,2],[0,4],[98,2],[0,2],[110,2],[0,2],[131,2],[0,2],[0,4]];
function playMusic(){
  if(musicPlaying) return;
  musicPlaying=true;scheduleMelody(0);
}
function scheduleMelody(startOffset){
  if(!musicPlaying) return;
  try{
    let ac=getAudio(),t=ac.currentTime+startOffset,total=0;
    melody.forEach(([freq,beats])=>{
      if(freq>0){
        let o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='square';o.frequency.value=freq;
        g.gain.setValueAtTime(0.0001,t+total*TEMPO);
        g.gain.linearRampToValueAtTime(0.06,t+total*TEMPO+0.01);
        g.gain.setValueAtTime(0.06,t+(total+beats-0.1)*TEMPO);
        g.gain.linearRampToValueAtTime(0.0001,t+(total+beats)*TEMPO);
        o.start(t+total*TEMPO);o.stop(t+(total+beats)*TEMPO+0.05);
        musicNodes.push(o);
      }
      total+=beats;
    });
    let bassOff=0;
    bass.forEach(([freq,beats])=>{
      if(freq>0){
        let o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='triangle';o.frequency.value=freq;
        g.gain.setValueAtTime(0.0001,t+bassOff*TEMPO);
        g.gain.linearRampToValueAtTime(0.045,t+bassOff*TEMPO+0.01);
        g.gain.setValueAtTime(0.045,t+(bassOff+beats-0.1)*TEMPO);
        g.gain.linearRampToValueAtTime(0.0001,t+(bassOff+beats)*TEMPO);
        o.start(t+bassOff*TEMPO);o.stop(t+(bassOff+beats)*TEMPO+0.05);
        musicNodes.push(o);
      }
      bassOff+=beats;
    });
    let loopLen=Math.max(total,bassOff)*TEMPO;
    musicTimeout=setTimeout(()=>scheduleMelody(0),loopLen*1000-200);
  }catch(e){}
}
function stopMusic(){
  musicPlaying=false;
  if(musicTimeout) clearTimeout(musicTimeout);
  musicNodes.forEach(n=>{try{n.stop();}catch(e){}});
  musicNodes=[];
}

function roundRect(ctx,x,y,w,h,r){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function initLevel(n,keepProgress){
  lvlData=levels[n];
  platforms=lvlData.platforms.map(p=>({...p,hit:false}));
  coins=lvlData.coins.map(c=>({...c,r:8,collected:false}));
  enemies=lvlData.enemies.map(e=>({...e,w:28,h:28,
    vx:-ENEMY_SPEED*(e.type==='koopa'?1.3:1),vy:0,
    alive:true,stomped:false,shell:false,shellTimer:0}));
  items=[];
  signs=(lvlData.signs||[]).map(s=>({...s,shown:false,alpha:0}));
  flag={...lvlData.flag,reached:false};
  camX=0;

  let prevCoins=keepProgress&&player?player.coins:0;
  let prevLives=keepProgress&&player?player.lives:MAX_LIVES;
  let prevBig  =keepProgress&&player?player.big:false;
  player=mkPlayer(60,355,prevCoins,prevLives,prevBig);
  updateHUD();
}

function mkPlayer(x,y,coins,lives,big){
  return {x,y,w:24,h:big?34:28,vx:0,vy:0,onGround:false,
          coins,lives,big:big||false,
          color:'#ffe600',hat:'#ccaa00',pants:'#cc6600',
          dir:1,frame:0,ft:0,invTimer:0,_jl:false,
          dead:false,respawnTimer:0,respawnX:60,respawnY:355};
}

function resetFull(){
  levels=makeLevels();
  tutorialDone=false;
  player=null;
  initLevel(0,false);
}

function resetToLevel(n){
  player=null;
  initLevel(n,false);
}

// ═══════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════
function updateCamera(){
  let tx=Math.max(0,Math.min(player.x-W/2,lvlData.width-W));
  camX+=(tx-camX)*0.1;
}

// ═══════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════
function updatePlayer(){
  let p=player;
  if(p.respawnTimer>0){p.respawnTimer--;if(p.respawnTimer===0)respawnPlayer();return;}
  if(p.dead) return;
  if(p.invTimer>0) p.invTimer--;

  let lD=keys['ArrowLeft'],rD=keys['ArrowRight'],spD=keys['a']||keys['A']||keys['ArrowUp'];

  // jump: Space (or Up arrow as fallback)
  if(spD&&p.onGround&&!p._jl){
    p.vy=JUMP_VY-(p.big?.5:0);
    p.onGround=false;p._jl=true;
    spawnParts(p.x+p.w/2,p.y+p.h,'#fff',4);
    SFX.jump();
  }
  if(!spD) p._jl=false;

  // horizontal — full control on ground and in air, but less acceleration airborne
  if(lD&&!rD){
    let accel=p.onGround?0.9:0.4;
    p.vx=Math.max(p.vx-accel,-SPEED);p.dir=-1;
  } else if(rD&&!lD){
    let accel=p.onGround?0.9:0.4;
    p.vx=Math.min(p.vx+accel,SPEED);p.dir=1;
  } else {
    p.vx*=p.onGround?0.72:0.88;
  }

  p.vy+=GRAV;p.x+=p.vx;p.y+=p.vy;p.onGround=false;

  for(let pl of platforms){
    if(pl._destroy) continue;
    if(p.x+p.w>pl.x&&p.x<pl.x+pl.w){
      if(p.vy>=0&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+18){
        p.y=pl.y-p.h;p.vy=0;p.onGround=true;
        p.respawnX=p.x;p.respawnY=p.y;
      } else if(p.vy<0&&p.y<pl.y+pl.h&&p.y>pl.y-20){
        p.y=pl.y+pl.h;p.vy=0;hitBlock(pl,p);
      }
    }
  }
  p.x=Math.max(0,Math.min(p.x,lvlData.width-p.w));
  if(p.y>H+80) killPlayer();
  p.ft++;if(p.ft>10){p.frame=(p.frame+1)%2;p.ft=0;}
}

function respawnPlayer(){
  let p=player;
  p.x=p.respawnX;p.y=p.respawnY;
  p.vx=0;p.vy=0;p.onGround=false;
  p.dead=false;p.respawnTimer=0;
  p.big=false;p.h=28;p.invTimer=200;
}

function hitBlock(pl,p){
  if(pl.hit||pl.t==='ground'||pl.t==='solid'||pl.t==='pipe') return;
  if(pl.t==='brick'){
    if(p.big){pl._destroy=true;spawnParts(pl.x+16,pl.y,'#c8a465',10);fTxt(pl.x+16,pl.y,'SMASH!','#c8a465');SFX.smash();}
    else{bumpBlock(pl);SFX.block();}
  } else if(pl.t==='question'){
    pl.hit=true;pl.t='used';bumpBlock(pl);SFX.block();
    if(pl.item==='coin'){p.coins++;updateHUD();fTxt(pl.x+16,pl.y-20,'+1 🪙','#ffe66d');spawnParts(pl.x+16,pl.y,'#ffe66d',5);SFX.coin();}
    else if(pl.item==='mushroom') items.push({x:pl.x,y:pl.y-32,w:24,h:24,type:'mushroom',vx:1,vy:0,alive:true});
  }
}
function bumpBlock(pl){pl._bumpTimer=12;pl._origY=pl.y;}

function killPlayer(){
  let p=player;
  if(p.dead) return;
  p.lives--;updateHUD();
  if(p.lives<=0){
    p.dead=true;p.lives=0;
    fTxt(p.x,p.y-20,'GAME OVER!','#ff4444');
    SFX.die();
    setTimeout(()=>{
      if(state==='playing'){
        state='dead';stopMusic();SFX.gameover();
        // if tutorial done, restart from level 1; otherwise from tutorial
        showOverlay('💀 GAME OVER',
          tutorialDone?'Starting over from Level 1...':'Starting over from the Tutorial...',
          '',true,false);
      }
    },1200);
  } else {
    p.dead=true;p.respawnTimer=RESPAWN_TIME;
    fTxt(p.x,p.y-20,`${p.lives} LIVES LEFT!`,'#ffaa00');
    spawnParts(p.x+p.w/2,p.y,'#ff6b6b',12);
    SFX.hurt();
  }
}

function hurtPlayer(){
  let p=player;
  if(p.dead||p.invTimer>0) return;
  if(p.big){
    p.big=false;p.h=28;p.invTimer=150;
    fTxt(p.x,p.y-10,'OUCH! SHRANK!','#ff8800');
    spawnParts(p.x+p.w/2,p.y,'#ffaa00',8);
    SFX.hurt();return;
  }
  killPlayer();
}

function updateEnemies(){
  enemies.forEach(e=>{
    if(!e.alive||e.stomped) return;
    if(e.shell){e.shellTimer--;if(e.shellTimer<=0){e.shell=false;e.vx=-ENEMY_SPEED*(e.type==='koopa'?1.3:1);}return;}
    let nextX=e.x+e.vx,groundAhead=false,groundUnder=false;
    for(let pl of platforms){
      if(pl._destroy) continue;
      let cx=e.vx>0?nextX+e.w+2:nextX-2;
      if(cx>pl.x&&cx<pl.x+pl.w&&e.y+e.h>=pl.y&&e.y+e.h<=pl.y+pl.h+4) groundAhead=true;
      if(e.x+2>pl.x&&e.x+e.w-2<pl.x+pl.w&&e.y+e.h>=pl.y&&e.y+e.h<=pl.y+pl.h+4) groundUnder=true;
    }
    if((!groundAhead&&groundUnder)||e.x<=0||e.x+e.w>=lvlData.width) e.vx*=-1;
    e.vy+=GRAV;e.x+=e.vx;e.y+=e.vy;e.onGround=false;
    for(let pl of platforms){
      if(pl._destroy) continue;
      if(e.x+e.w>pl.x&&e.x<pl.x+pl.w&&e.vy>=0&&e.y+e.h>pl.y&&e.y+e.h<pl.y+pl.h+14){e.y=pl.y-e.h;e.vy=0;e.onGround=true;}
    }
    if(e.y>H+80) e.alive=false;
  });
}

function updateItems(){
  items.forEach(it=>{
    if(!it.alive) return;
    it.vy+=GRAV;it.x+=it.vx;it.y+=it.vy;
    for(let pl of platforms){
      if(pl._destroy) continue;
      if(it.x+it.w>pl.x&&it.x<pl.x+pl.w&&it.vy>=0&&it.y+it.h>pl.y&&it.y+it.h<pl.y+pl.h+10){it.y=pl.y-it.h;it.vy=0;}
    }
    if(it.x<0||it.x+it.w>lvlData.width) it.vx*=-1;
    if(it.y>H+80){it.alive=false;return;}
    let p=player;
    if(!p.dead&&p.respawnTimer===0&&it.alive&&p.x<it.x+it.w&&p.x+p.w>it.x&&p.y<it.y+it.h&&p.y+p.h>it.y){
      it.alive=false;
      if(it.type==='mushroom'){
        if(!p.big){p.big=true;p.h=34;fTxt(it.x,it.y-20,'BIG! +EXTRA LIFE!','#ff6b6b');}
        else{if(p.lives<MAX_LIVES){p.lives++;fTxt(it.x,it.y-20,'+1 LIFE! ❤️','#ff6b6b');}else fTxt(it.x,it.y-20,'FULL LIVES!','#ff6b6b');}
        spawnParts(it.x+12,it.y,'#ff6b6b',10);updateHUD();SFX.powerup();
      }
    }
  });
}

function checkEnemies(){
  let p=player;
  if(p.dead||p.invTimer>0||p.respawnTimer>0) return;
  enemies.forEach(e=>{
    if(!e.alive||e.stomped) return;
    if(p.x+p.w>e.x&&p.x<e.x+e.w&&p.y+p.h>e.y&&p.y<e.y+e.h){
      if(p.y+p.h<e.y+e.h*0.55&&p.vy>0){
        if(e.type==='koopa'&&!e.shell){e.shell=true;e.shellTimer=280;e.vx=0;}
        else{e.stomped=true;e.alive=false;}
        p.vy=STOMP_VY;p.coins+=2;updateHUD();
        fTxt(e.x+14,e.y-10,'STOMP! +2🪙','#ffe66d');spawnParts(e.x+14,e.y,'#a0522d',7);SFX.stomp();
      } else hurtPlayer();
    }
  });
}

function checkCoins(){
  let p=player;
  if(p.dead||p.respawnTimer>0) return;
  coins.forEach(c=>{
    if(!c.collected&&p.x<c.x+c.r&&p.x+p.w>c.x-c.r&&p.y<c.y+c.r&&p.y+p.h>c.y-c.r){
      c.collected=true;spawnParts(c.x,c.y,'#ffe66d',5);
      p.coins++;updateHUD();fTxt(c.x,c.y-10,'+1🪙','#ffe66d');SFX.coin();
    }
  });
}

function updateSigns(){
  signs.forEach(s=>{
    if(player&&!player.dead&&player.x>s.triggerX) s.shown=true;
    if(s.shown) s.alpha=Math.min(1,(s.alpha||0)+0.04);
  });
}

function spawnParts(x,y,color,n){for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*4,vy:-Math.random()*3-1,life:35,max:35,color});}
function updateParts(){particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});}
function fTxt(x,y,text,color){floatingTexts.push({x,y,text,color,life:90});}
function updateFTxt(){floatingTexts=floatingTexts.filter(t=>t.life>0);floatingTexts.forEach(t=>{t.y-=0.35;t.life--;});}

// ═══════════════════════════════════════
// DRAW
// ═══════════════════════════════════════
function drawBg(){
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,lvlData.bg[0]);g.addColorStop(1,lvlData.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[80,50,45],[240,34,38],[490,58,52],[660,40,40],[860,54,47],[1100,36,42]].forEach(([cx,cy,r])=>{
    let ax=((cx-camX*0.28)%W+W)%W;
    ctx.beginPath();ctx.arc(ax,cy,r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ax+r*.6,cy+8,r*.7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ax-r*.6,cy+8,r*.7,0,Math.PI*2);ctx.fill();
  });
}

function drawWorld(){
  // platforms
  platforms.forEach(pl=>{
    if(pl._destroy) return;
    let dx=pl.x-camX,dy=pl.y;
    if(pl._bumpTimer>0){dy=pl._origY-Math.sin((12-pl._bumpTimer)/12*Math.PI)*7;pl._bumpTimer--;}
    drawPlatform(pl,dx,dy);
  });
  platforms=platforms.filter(p=>!p._destroy);

  // coins
  coins.forEach(c=>{
    if(c.collected) return;
    let dx=c.x-camX,bob=Math.sin(frameCount/20+c.x)*2.5;
    ctx.fillStyle='#ffe66d';ctx.beginPath();ctx.arc(dx,c.y+bob,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(dx-2,c.y+bob-2,c.r*.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#cc9900';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(dx,c.y+bob,c.r,0,Math.PI*2);ctx.stroke();
  });

  // sky banners
  signs.forEach(s=>{
    if(!s.shown||!s.alpha) return;
    let dx=s.x-camX,by=s.y;
    if(dx<-160||dx>W+160) return;
    let bw=148,bh=s.lines.length*20+54,bx=dx-bw/2;
    ctx.globalAlpha=s.alpha;
    let cols={walk:'#4ecdc4',jump:'#ffe66d',coin:'#ffd700',block:'#ff9f43',mush:'#e84393',big:'#a29bfe',stomp:'#ff6b6b',flag:'#a29bfe'};
    let darks={walk:'#00897b',jump:'#c8950a',coin:'#8B6000',block:'#e65100',mush:'#9b0058',big:'#4a3ab5',stomp:'#c0392b',flag:'#6c5ce7'};
    let col=cols[s.icon]||'#fff',dark=darks[s.icon]||'#333';
    ctx.shadowColor=col;ctx.shadowBlur=12;
    ctx.fillStyle=col;ctx.beginPath();roundRect(ctx,bx,by,bw,bh,10);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=dark;ctx.lineWidth=2.5;ctx.beginPath();roundRect(ctx,bx,by,bw,bh,10);ctx.stroke();
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(dx-10,by+bh);ctx.lineTo(dx+10,by+bh);ctx.lineTo(dx,by+bh+14);ctx.closePath();ctx.fill();
    ctx.strokeStyle=dark;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(dx-10,by+bh);ctx.lineTo(dx,by+bh+14);ctx.lineTo(dx+10,by+bh);ctx.stroke();
    let icons={walk:'👣',jump:'⬆',coin:'🪙',block:'❓',mush:'🍄',big:'⭐',stomp:'💥',flag:'🚩'};
    ctx.font='18px serif';ctx.textAlign='center';ctx.fillText(icons[s.icon]||'★',dx,by+22);
    ctx.strokeStyle=dark;ctx.lineWidth=1;ctx.globalAlpha=s.alpha*0.3;
    ctx.beginPath();ctx.moveTo(bx+8,by+30);ctx.lineTo(bx+bw-8,by+30);ctx.stroke();
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle=dark;ctx.font='bold 11px monospace';ctx.textAlign='center';
    s.lines.forEach((ln,i)=>ctx.fillText(ln,dx,by+48+i*20));
    ctx.globalAlpha=1;ctx.textAlign='left';ctx.shadowBlur=0;
  });

  // items
  items.forEach(it=>{
    if(!it.alive) return;
    let dx=it.x-camX;
    ctx.fillStyle='#dd3333';ctx.beginPath();ctx.arc(dx+it.w/2,it.y+8,it.w/2,Math.PI,0);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(dx+8,it.y+6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(dx+it.w-8,it.y+6,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffe090';ctx.fillRect(dx+4,it.y+8,it.w-8,it.h-8);
    ctx.fillStyle='#000';ctx.fillRect(dx+8,it.y+12,3,5);ctx.fillRect(dx+it.w-11,it.y+12,3,5);
  });

  // enemies
  enemies.forEach(e=>{
    if(!e.alive) return;
    let dx=e.x-camX;
    if(e.stomped){ctx.fillStyle='#a0522d';ctx.fillRect(dx,e.y+e.h-8,e.w,8);return;}
    if(e.type==='goomba'){
      ctx.fillStyle='#a0522d';ctx.fillRect(dx+2,e.y+10,e.w-4,e.h-10);
      ctx.fillStyle='#c87040';ctx.beginPath();ctx.ellipse(dx+e.w/2,e.y+8,e.w/2,10,0,0,Math.PI*2);ctx.fill();
      let lf=Math.sin(frameCount/12)*3;
      ctx.fillStyle='#3d2000';ctx.fillRect(dx+2,e.y+e.h,8,4+lf);ctx.fillRect(dx+e.w-10,e.y+e.h,8,4-lf);
      ctx.fillStyle='#fff';ctx.fillRect(dx+4,e.y+4,6,6);ctx.fillRect(dx+e.w-10,e.y+4,6,6);
      ctx.fillStyle='#000';ctx.fillRect(dx+5,e.y+5,4,4);ctx.fillRect(dx+e.w-9,e.y+5,4,4);
      ctx.strokeStyle='#000';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(dx+3,e.y+3);ctx.lineTo(dx+10,e.y+6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(dx+e.w-3,e.y+3);ctx.lineTo(dx+e.w-10,e.y+6);ctx.stroke();
    } else if(e.type==='koopa'){
      if(e.shell){
        ctx.fillStyle='#3cb040';ctx.beginPath();ctx.ellipse(dx+e.w/2,e.y+e.h/2,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#1a5020';ctx.lineWidth=2;ctx.stroke();
        ctx.strokeStyle='#fff';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(dx+e.w/2,e.y+4);ctx.lineTo(dx+e.w/2,e.y+e.h-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(dx+4,e.y+e.h/2);ctx.lineTo(dx+e.w-4,e.y+e.h/2);ctx.stroke();
        return;
      }
      ctx.fillStyle='#3cb040';ctx.beginPath();ctx.ellipse(dx+e.w/2,e.y+14,e.w/2-2,10,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffe090';ctx.beginPath();ctx.ellipse(dx+e.w/2+(e.vx<0?-6:6),e.y+4,8,9,0,0,Math.PI*2);ctx.fill();
      let ex2=e.vx<0?dx+3:dx+e.w-9;
      ctx.fillStyle='#000';ctx.fillRect(ex2,e.y+2,5,5);
      ctx.fillStyle='#a0522d';ctx.fillRect(dx+2,e.y+e.h,8,5);ctx.fillRect(dx+e.w-10,e.y+e.h,8,5);
    }
  });

  // flag
  let fdx=flag.x-camX;
  ctx.fillStyle='#aaa';ctx.fillRect(fdx,flag.y,4,flag.h);
  let wave=Math.sin(frameCount/18)*4;
  ctx.fillStyle=flag.reached?'#ffe66d':'#ff4444';
  ctx.beginPath();ctx.moveTo(fdx+4,flag.y);ctx.lineTo(fdx+36+wave,flag.y+12);ctx.lineTo(fdx+4,flag.y+24);ctx.fill();
  ctx.fillStyle='#777';ctx.fillRect(fdx-8,flag.y+flag.h-6,22,8);

  // player
  let p=player;
  if(p.respawnTimer>0){
    if(Math.floor(p.respawnTimer/10)%2===0){
      ctx.globalAlpha=0.4;drawPlayerShape(p);
      let prog=1-(p.respawnTimer/RESPAWN_TIME);
      ctx.strokeStyle=p.color;ctx.lineWidth=3;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.arc(p.respawnX-camX+p.w/2,p.respawnY+p.h/2,22,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
  } else if(!p.dead){
    if(!(p.invTimer>0&&Math.floor(p.invTimer/5)%2===0)){
      ctx.globalAlpha=1;drawPlayerShape(p);
    }
  }
  ctx.globalAlpha=1;

  // floating texts
  floatingTexts.forEach(t=>{
    ctx.globalAlpha=Math.min(1,t.life/25);
    ctx.fillStyle=t.color;ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText(t.text,t.x-camX,t.y);
  });
  ctx.globalAlpha=1;ctx.textAlign='left';

  // particles
  particles.forEach(pt=>{
    ctx.globalAlpha=pt.life/pt.max;ctx.fillStyle=pt.color;ctx.fillRect(pt.x-camX-2,pt.y-2,5,5);
  });
  ctx.globalAlpha=1;
}

function drawPlayerShape(p){
  let dx=p.x-camX,bh=p.big?34:28;
  let leg=p.onGround?Math.sin(p.frame*Math.PI)*3.5:0;
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(dx+p.w/2,p.y+bh+2,11,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p.color;ctx.fillRect(dx+2,p.y+(bh-18),p.w-4,18);
  ctx.fillStyle=p.pants;ctx.fillRect(dx+4,p.y+(bh-10),p.w-8,10);
  ctx.fillStyle=p.color;
  ctx.fillRect(dx+3,p.y+bh,8,5+leg);ctx.fillRect(dx+p.w-11,p.y+bh,8,5-leg);
  ctx.fillStyle='#3d2b00';
  ctx.fillRect(dx+1,p.y+bh+leg,10,5);ctx.fillRect(dx+p.w-11,p.y+bh-leg,10,5);
  ctx.fillStyle=p.color;ctx.fillRect(dx+2,p.y,p.w-4,bh-12);
  ctx.fillStyle=p.hat;ctx.fillRect(dx,p.y+4,p.w,6);ctx.fillRect(dx+4,p.y-4,p.w-8,10);
  if(p.big){ctx.fillStyle=p.hat;ctx.fillRect(dx+4,p.y-8,p.w-8,6);}
  let ex=p.dir>0?dx+p.w-10:dx+4;
  ctx.fillStyle='#fff';ctx.fillRect(ex,p.y+3,6,5);
  ctx.fillStyle='#000';ctx.fillRect(ex+(p.dir>0?2:0),p.y+4,3,3);
  ctx.fillStyle='#3d2b00';ctx.fillRect(dx+5,p.y+9,p.w-10,3);
}

function drawPlatform(pl,dx,dy){
  if(pl.t==='ground'){
    ctx.fillStyle='#5ba020';ctx.fillRect(dx,dy,pl.w,14);
    ctx.fillStyle='#8B4513';ctx.fillRect(dx,dy+14,pl.w,pl.h-14);
    ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
    for(let bx=0;bx<pl.w;bx+=20) ctx.strokeRect(dx+bx,dy+14,20,pl.h-14);
  } else if(pl.t==='brick'){
    ctx.fillStyle='#c84c0c';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.fillStyle='rgba(0,0,0,0.22)';
    for(let row=0;row<pl.h;row+=16){let off=row%32===0?0:8;for(let col=0;col<pl.w;col+=16) ctx.fillRect(dx+col+off%pl.w,dy+row,14,14);}
    ctx.strokeStyle='#7a2c06';ctx.lineWidth=1;ctx.strokeRect(dx,dy,pl.w,pl.h);
  } else if(pl.t==='question'){
    let pulse=Math.sin(frameCount/10)*0.12+0.88;
    ctx.fillStyle=`rgba(255,200,0,${pulse})`;ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.fillStyle='#fff';ctx.font='bold 18px serif';ctx.textAlign='center';
    ctx.fillText('?',dx+pl.w/2,dy+pl.h-6);ctx.textAlign='left';
    ctx.strokeStyle='#8B6000';ctx.lineWidth=1.5;ctx.strokeRect(dx,dy,pl.w,pl.h);
  } else if(pl.t==='used'){
    ctx.fillStyle='#888';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(dx,dy,pl.w,pl.h);
  } else if(pl.t==='solid'){
    ctx.fillStyle='#e0c070';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.strokeStyle='#b09040';ctx.lineWidth=1;
    for(let bx=0;bx<pl.w;bx+=16) for(let by=0;by<pl.h;by+=16) ctx.strokeRect(dx+bx,dy+by,16,16);
  } else if(pl.t==='pipe'){
    ctx.fillStyle='#3cb040';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.fillStyle='#2a8030';ctx.fillRect(dx+pl.w*0.55,dy,pl.w*0.3,pl.h);
    ctx.fillStyle='#3cb040';ctx.fillRect(dx-4,dy,pl.w+8,16);
    ctx.fillStyle='#2a8030';ctx.fillRect(dx+pl.w*0.55-2,dy,pl.w*0.3,16);
    ctx.strokeStyle='#1a5020';ctx.lineWidth=1.5;ctx.strokeRect(dx-4,dy,pl.w+8,16);ctx.strokeRect(dx,dy,pl.w,pl.h);
  }
}

function drawHUD(){
  let fdx=flag.x-camX;
  if(fdx>W-10){ctx.fillStyle='#ffe66d';ctx.font='bold 14px monospace';ctx.fillText('FLAG ▶',W-90,26);}
  if(flag.reached){ctx.fillStyle='#ffe600';ctx.font='13px monospace';ctx.fillText('✓ FLAG!',8,26);}
}

function updateHUD(){
  let p=player;
  document.getElementById('pcoins').textContent=p.coins;
  document.getElementById('plives').textContent='❤️'.repeat(Math.max(0,p.lives));
  document.getElementById('psize').textContent=p.big?'⭐ BIG':'';
  document.getElementById('lvlDisp').textContent=lvlData?lvlData.name:'...';
}

function showOverlay(t,m,s,showRestart,showNext){
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ctrlInfo').style.display='none';
  document.getElementById('oTitle').textContent=t;
  document.getElementById('oMsg').textContent=m;
  document.getElementById('startMsg').textContent=s;
  document.getElementById('restartBtn').style.display=showRestart?'inline-block':'none';
  document.getElementById('nextBtn').style.display=showNext?'inline-block':'none';
}

function doRestart(){
  stopMusic();
  // restart from level 1 if tutorial was done, else from tutorial
  let startLevel=tutorialDone?1:0;
  levels=makeLevels();
  player=null;
  initLevel(startLevel,false);
  state='playing';
  document.getElementById('overlay').style.display='none';
  playMusic();
}

function doNextLevel(){
  let nextLvl=levels.indexOf(lvlData)+1;
  if(nextLvl<levels.length){
    initLevel(nextLvl,true); // keep coins + lives
  }
  state='playing';
  document.getElementById('overlay').style.display='none';
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(!keys[e.key]) kTime[e.key]=Date.now();
  keys[e.key]=true;
  if(state==='title'){
    if(keys['ArrowLeft']||keys['ArrowRight']||keys['a']||keys['A']){
      state='playing';document.getElementById('overlay').style.display='none';playMusic();
    }
  }
  if(state==='dead'&&(keys['ArrowLeft']||keys['ArrowRight']||keys['a']||keys['A'])){
    doRestart();
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ═══════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════
let currentLevelIndex=0;
function loop(){
  frameCount++;
  ctx.clearRect(0,0,W,H);

  if(state==='playing'){
    updatePlayer();
    updateEnemies();updateItems();updateSigns();
    checkEnemies();checkCoins();
    updateCamera();updateParts();updateFTxt();

    // flag check
    let p=player;
    if(!p.dead&&p.respawnTimer===0&&
       p.x+p.w>flag.x&&p.x<flag.x+20&&p.y+p.h>flag.y&&p.y<flag.y+flag.h){
      flag.reached=true;
    }

    if(flag.reached&&state==='playing'){
      state='win';stopMusic();
      currentLevelIndex=levels.indexOf(lvlData);
      if(currentLevelIndex===0){
        // tutorial complete
        tutorialDone=true;
        SFX.flagpole();
        showOverlay('🎉 TUTORIAL DONE!',
          'Great teamwork! Ready for the real thing?',
          'Press any key for Level 1!',true,true);
      } else {
        // final level
        SFX.levelclear();
        showOverlay('🏆 CONGRATULATIONS!',
          `Amazing! Total coins: ${p.coins}🪙`,
          '',true,false);
      }
    }
  }

  drawBg();drawWorld();
  if(state==='playing') drawHUD();
  requestAnimationFrame(loop);
}

// ── Boot ──
levels=makeLevels();
initLevel(0,false);
showOverlay('Super Makey Makey Bros.','Work together to reach the FLAG!',
  'Press SPACE or ← → to start!',false,false);
document.getElementById('ctrlInfo').style.display='block';
loop();
</script>
