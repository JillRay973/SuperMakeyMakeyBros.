<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Makey Makey Bros.</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;overflow:hidden;}
  #ui{display:flex;justify-content:space-between;align-items:center;width:800px;padding:6px 12px;background:#000;border-radius:8px 8px 0 0;}
  .phud{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:bold;}
  #p1hud{color:#ffe600;}#p2hud{color:#ff00cc;}
  canvas{display:block;border-radius:0 0 8px 8px;}
  #overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;pointer-events:none;}
  #overlay h1{font-size:34px;text-shadow:3px 3px #000;margin-bottom:8px;}
  #overlay p{font-size:14px;text-shadow:2px 2px #000;}
  #startMsg{font-size:19px;animation:blink 1s infinite;color:#ffe66d;margin-top:10px;}
  #ctrlInfo{color:#ccc;font-size:12px;margin-top:6px;line-height:1.7;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="ui">
  <div class="phud" id="p1hud">🔴 P1 <span id="p1lives"></span> <span id="p1size"></span> 🪙<span id="p1coins">0</span></div>
  <div style="color:#ffe66d;font-size:13px;font-weight:bold;" id="lvlDisp">TUTORIAL</div>
  <div class="phud" id="p2hud">🔵 P2 <span id="p2lives"></span> <span id="p2size"></span> 🪙<span id="p2coins">0</span></div>
</div>
<canvas id="c" width="800" height="450"></canvas>
<div id="overlay">
  <h1 id="oTitle">Super Makey Makey Bros.</h1>
  <p id="oMsg">Work together to reach the FLAG!</p>
  <div id="ctrlInfo">
    🔴 P1: ← → Arrow Keys &nbsp;|&nbsp; LEFT+RIGHT = Jump<br>
    🔵 P2: A D Keys &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp; A+D = Jump
  </div>
  <p id="startMsg">Stomp both arrows to start!</p>
  <div style="display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;justify-content:center;">
    <button id="nextBtn" onclick="doNextLevel()" style="display:none;padding:10px 28px;font-size:16px;font-family:'Courier New',monospace;font-weight:bold;background:#ffe600;color:#333;border:none;border-radius:8px;cursor:pointer;">▶ NEXT LEVEL</button>
    <button id="restartBtn" onclick="doRestart()" style="display:none;padding:10px 28px;font-size:16px;font-family:'Courier New',monospace;font-weight:bold;background:#ff00cc;color:#fff;border:none;border-radius:8px;cursor:pointer;">↺ RESTART</button>
  </div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=800,H=450;
const GRAV=0.38,JUMP_VY=-10,SPEED=2.2,ENEMY_SPEED=0.5,STOMP_VY=-7,JUMP_WIN=120;
const SPLIT_THRESH=680;
const MAX_LIVES=3;
const RESPAWN_TIME=180; // frames (~3s)

let splitBlend=0,splitMode=false,cam1X=0,cam2X=0,camX=0;
let state='title',keys={},kTime={},level=0;
let particles=[],floatingTexts=[];
let levels,lvlData,platforms,coins,enemies,items,signs,flag;
let p1,p2,frameCount=0;

function roundRect(ctx,x,y,w,h,r){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

        {x:920,y:400,w:400,h:50,t:'ground'},{x:1390,y:400,w:300,h:50,t:'ground'},
        {x:1750,y:400,w:450,h:50,t:'ground'},
        {x:580,y:340,w:80,h:16,t:'brick'},{x:720,y:310,w:80,h:16,t:'brick'},
        {x:960,y:290,w:32,h:32,t:'question',item:'coin'},
        {x:1010,y:290,w:32,h:32,t:'question',item:'mushroom'},
        {x:1760,y:368,w:32,h:32,t:'solid'},{x:1792,y:336,w:32,h:64,t:'solid'},
        {x:1824,y:304,w:32,h:96,t:'solid'},{x:1856,y:272,w:32,h:128,t:'solid'},
      ],
      coins:[{x:100,y:360},{x:160,y:360},{x:220,y:360},{x:600,y:310},{x:740,y:280},{x:1000,y:355},{x:1050,y:355}],
      enemies:[{x:1150,y:372,type:'goomba'}],
      signs:[
        {x:160, y:160,lines:['STOMP THE','← or → ARROW','TO WALK!'],         icon:'walk', triggerX:0},
        {x:530, y:160,lines:['STOMP BOTH','← AND →','TO JUMP!'],             icon:'jump', triggerX:380},
        {x:730, y:160,lines:['COINS GIVE','YOU POINTS!','COLLECT THEM!'],    icon:'coin', triggerX:560},
        {x:990, y:160,lines:['JUMP AND HIT','THE ? BLOCK','FROM BELOW!'],    icon:'block',triggerX:860},
        {x:1200,y:160,lines:['🍄 MUSHROOM','= BIG + EXTRA','LIFE! GRAB IT!'],icon:'mush', triggerX:1050},
        {x:1430,y:160,lines:['BIG = SURVIVE','ONE HIT THEN','SHRINKS FIRST'],icon:'big',  triggerX:1300},
        {x:1430,y:280,lines:['STOMP ON TOP','OF THE ENEMY','TO DEFEAT IT!'], icon:'stomp',triggerX:1300},
        {x:1900,y:160,lines:['BOTH PLAYERS','REACH THE FLAG','TO WIN!'],     icon:'flag', triggerX:1700},
      ],
      flag:{x:2060,y:270,h:130},
    },
    {
      name:'LEVEL 1',bg:['#5c94fc','#a0c8f0'],width:2400,
      platforms:[
        {x:0,y:400,w:380,h:50,t:'ground'},{x:440,y:400,w:280,h:50,t:'ground'},
        {x:780,y:400,w:260,h:50,t:'ground'},{x:1100,y:400,w:300,h:50,t:'ground'},
        {x:1460,y:400,w:340,h:50,t:'ground'},{x:1860,y:400,w:540,h:50,t:'ground'},
        {x:180,y:280,w:32,h:32,t:'question',item:'coin'},{x:260,y:280,w:32,h:32,t:'brick'},
        {x:292,y:280,w:32,h:32,t:'question',item:'mushroom'},{x:324,y:280,w:32,h:32,t:'brick'},
        {x:460,y:250,w:32,h:32,t:'question',item:'coin'},{x:500,y:250,w:32,h:32,t:'question',item:'coin'},
        {x:660,y:275,w:96,h:32,t:'brick'},{x:820,y:260,w:32,h:32,t:'question',item:'mushroom'},
        {x:910,y:285,w:64,h:32,t:'brick'},{x:1000,y:255,w:32,h:32,t:'question',item:'coin'},
        {x:1120,y:270,w:32,h:32,t:'brick'},{x:1200,y:250,w:32,h:32,t:'question',item:'coin'},
        {x:1300,y:275,w:96,h:32,t:'brick'},{x:1480,y:260,w:32,h:32,t:'question',item:'mushroom'},
        {x:1560,y:280,w:64,h:32,t:'brick'},{x:1680,y:255,w:32,h:32,t:'question',item:'coin'},
        {x:400,y:355,w:40,h:45,t:'pipe'},{x:740,y:340,w:40,h:60,t:'pipe'},
        {x:1060,y:340,w:40,h:60,t:'pipe'},{x:1420,y:355,w:40,h:45,t:'pipe'},
        {x:1880,y:368,w:32,h:32,t:'solid'},{x:1912,y:336,w:32,h:64,t:'solid'},
        {x:1944,y:304,w:32,h:96,t:'solid'},{x:1976,y:272,w:32,h:128,t:'solid'},
      ],
      coins:[
        {x:80,y:355},{x:130,y:355},{x:180,y:355},{x:460,y:355},{x:510,y:355},
        {x:820,y:355},{x:870,y:355},{x:1120,y:355},{x:1170,y:355},
        {x:1480,y:355},{x:1530,y:355},{x:1880,y:355},{x:1920,y:355},
      ],
      enemies:[
        {x:300,y:372,type:'goomba'},{x:520,y:372,type:'goomba'},{x:680,y:372,type:'koopa'},
        {x:860,y:372,type:'goomba'},{x:1000,y:372,type:'goomba'},{x:1160,y:372,type:'koopa'},
        {x:1320,y:372,type:'goomba'},{x:1520,y:372,type:'goomba'},{x:1700,y:372,type:'koopa'},
      ],
      signs:[],
      flag:{x:2180,y:270,h:130},
    }
  ];
}

function initLevel(n,keepCoins){
  lvlData=levels[n];
  platforms=lvlData.platforms.map(p=>({...p,hit:false}));
  coins=lvlData.coins.map(c=>({...c,r:8,collected:false}));
  enemies=lvlData.enemies.map(e=>({...e,w:28,h:28,vx:-ENEMY_SPEED*(e.type==='koopa'?1.3:1),vy:0,alive:true,stomped:false,shell:false,shellTimer:0}));
  items=[];signs=(lvlData.signs||[]).map(s=>({...s,shown:false,alpha:0}));
  flag={...lvlData.flag,r1:false,r2:false};
  camX=0;cam1X=0;cam2X=0;splitBlend=0;
  let pc=keepCoins&&p1?p1.coins:0,qc=keepCoins&&p2?p2.coins:0;
  let pl=keepCoins&&p1?p1.lives:MAX_LIVES,ql=keepCoins&&p2?p2.lives:MAX_LIVES;
  let pb=keepCoins&&p1?p1.big:false,qb=keepCoins&&p2?p2.big:false;
  p1=mkP(60, 355,'#ffe600','#ccaa00','#cc6600',pc,pl,pb);
  p2=mkP(100,355,'#ff00cc','#aa0088','#660099',qc,ql,qb);
  updateHUD();
}

function mkP(x,y,color,hat,pants,coins,lives,big){
  return {x,y,w:24,h:big?32:28,vx:0,vy:0,onGround:false,
          coins,lives,big:big||false,color,hat,pants,
          dir:1,frame:0,ft:0,invTimer:0,_jl:false,
          dead:false,respawnTimer:0,respawnX:x,respawnY:355};
}

function resetGame(){
  levels=makeLevels();level=0;p1=null;p2=null;
  initLevel(0,false);
}

// ── respawn ──
function respawnPlayer(p){
  // respawn at last safe ground position or level start
  p.x=p.respawnX;p.y=p.respawnY;
  p.vx=0;p.vy=0;p.onGround=false;
  p.dead=false;p.respawnTimer=0;
  p.big=false;p.h=28;
  p.invTimer=200;
}

// ── camera ──
function updateCamera(){
  let alive=[p1,p2].filter(p=>!p.dead&&p.respawnTimer===0);
  if(!alive.length) alive=[p1,p2];
  let ax=alive.reduce((s,p)=>s+p.x,0)/alive.length;
  let targetShared=Math.max(0,Math.min(ax-W/2,lvlData.width-W));
  let hw=W/2;
  let t1=Math.max(0,Math.min(p1.x-hw/2,lvlData.width-hw));
  let t2=Math.max(0,Math.min(p2.x-hw/2,lvlData.width-hw));
  let dist=Math.abs(p1.x-p2.x);
  let wantSplit=!p1.dead&&!p2.dead&&p1.respawnTimer===0&&p2.respawnTimer===0&&dist>SPLIT_THRESH;
  splitBlend+=wantSplit?(splitBlend<1?0.04:0):(splitBlend>0?-0.04:0);
  splitBlend=Math.max(0,Math.min(1,splitBlend));
  camX+=(targetShared-camX)*0.08;
  cam1X+=(t1-cam1X)*0.08;
  cam2X+=(t2-cam2X)*0.08;
}

// ── physics ──
function updatePlayer(p,lKey,rKey){
  // handle respawn countdown
  if(p.respawnTimer>0){
    p.respawnTimer--;
    if(p.respawnTimer===0) respawnPlayer(p);
    return;
  }
  if(p.dead) return;
  if(p.invTimer>0) p.invTimer--;

  let lD=keys[lKey],rD=keys[rKey];
  let lt=kTime[lKey]||0,rt=kTime[rKey]||0;
  let both=lD&&rD&&Math.abs(lt-rt)<JUMP_WIN;
  if(both&&p.onGround&&!p._jl){p.vy=JUMP_VY-(p.big?.5:0);p.vx=0;p.onGround=false;p._jl=true;spawnParts(p.x+p.w/2,p.y+p.h,'#fff',4);}
  if(!both) p._jl=false;
  if(!both){
    if(lD&&!rD){if(p.onGround)p.vx=-SPEED;else p.vx=Math.max(p.vx,-SPEED);p.dir=-1;}
    else if(rD&&!lD){if(p.onGround)p.vx=SPEED;else p.vx=Math.min(p.vx,SPEED);p.dir=1;}
    else p.vx*=0.8;
  } else {
    p.vx*=0.8;
  }
  // no air-steering: if airborne and moving, don't let held keys sustain speed
  if(!p.onGround){p.vx*=0.92;}
  p.vy+=GRAV;p.x+=p.vx;p.y+=p.vy;p.onGround=false;
  for(let pl of platforms){
    if(pl._destroy) continue;
    if(p.x+p.w>pl.x&&p.x<pl.x+pl.w){
      if(p.vy>=0&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+18){
        p.y=pl.y-p.h;p.vy=0;p.onGround=true;
        // update safe respawn point
        p.respawnX=p.x;p.respawnY=p.y;
      } else if(p.vy<0&&p.y<pl.y+pl.h&&p.y>pl.y-20){p.y=pl.y+pl.h;p.vy=0;hitBlock(pl,p);}
    }
  }
  p.x=Math.max(0,Math.min(p.x,lvlData.width-p.w));
  if(p.y>H+80) killPlayer(p);
  p.ft++;if(p.ft>10){p.frame=(p.frame+1)%2;p.ft=0;}
}

function hitBlock(pl,p){
  if(pl.hit||pl.t==='ground'||pl.t==='solid'||pl.t==='pipe') return;
  if(pl.t==='brick'){
    if(p.big){pl._destroy=true;spawnParts(pl.x+16,pl.y,'#c8a465',10);fTxt(pl.x+16,pl.y,'SMASH!','#c8a465');}
    else bumpBlock(pl);
  } else if(pl.t==='question'){
    pl.hit=true;pl.t='used';bumpBlock(pl);
    if(pl.item==='coin'){p.coins++;updateHUD();fTxt(pl.x+16,pl.y-20,'+1 🪙','#ffe66d');spawnParts(pl.x+16,pl.y,'#ffe66d',5);}
    else if(pl.item==='mushroom') items.push({x:pl.x,y:pl.y-32,w:24,h:24,type:'mushroom',vx:1,vy:0,alive:true});
  }
}
function bumpBlock(pl){pl._bumpTimer=12;pl._origY=pl.y;}

function killPlayer(p){
  if(p.dead) return;
  p.lives--;updateHUD();
  if(p.lives<=0){
    p.dead=true;p.lives=0;
    fTxt(p.x,p.y-20,'OUT OF LIVES!','#ff4444');
    if(p1.dead&&p2.dead) setTimeout(()=>{if(state==='playing') state='dead';},800);
  } else {
    p.dead=true;
    p.respawnTimer=RESPAWN_TIME;
    fTxt(p.x,p.y-20,`${p.lives} LIVES LEFT!`,'#ffaa00');
    spawnParts(p.x+p.w/2,p.y,'#ff6b6b',12);
  }
}

function hurtPlayer(p,fell){
  if(p.dead||p.invTimer>0) return;
  if(p.big){
    p.big=false;p.h=28;p.invTimer=150;
    fTxt(p.x,p.y-10,'OUCH! SHRANK!','#ff8800');
    spawnParts(p.x+p.w/2,p.y,'#ffaa00',8);
    return;
  }
  killPlayer(p);
}

function updateEnemies(){
  enemies.forEach(e=>{
    if(!e.alive||e.stomped) return;
    if(e.shell){e.shellTimer--;if(e.shellTimer<=0){e.shell=false;e.vx=-ENEMY_SPEED*(e.type==='koopa'?1.3:1);}return;}

    // probe one step ahead at foot level to detect edges
    let nextX=e.x+e.vx;
    let groundAhead=false;
    for(let pl of platforms){
      if(pl._destroy) continue;
      let checkX=e.vx>0?nextX+e.w+2:nextX-2;
      if(checkX>pl.x&&checkX<pl.x+pl.w&&e.y+e.h>=pl.y&&e.y+e.h<=pl.y+pl.h+4){
        groundAhead=true;break;
      }
    }
    // also check current ground still under feet (for when platform ends)
    let groundUnder=false;
    for(let pl of platforms){
      if(pl._destroy) continue;
      if(e.x+2>pl.x&&e.x+e.w-2<pl.x+pl.w&&e.y+e.h>=pl.y&&e.y+e.h<=pl.y+pl.h+4){
        groundUnder=true;break;
      }
    }

    // turn around at edges or world bounds
    if((!groundAhead&&groundUnder)||e.x<=0||e.x+e.w>=lvlData.width) e.vx*=-1;

    e.vy+=GRAV;e.x+=e.vx;e.y+=e.vy;e.onGround=false;
    for(let pl of platforms){
      if(pl._destroy) continue;
      if(e.x+e.w>pl.x&&e.x<pl.x+pl.w&&e.vy>=0&&e.y+e.h>pl.y&&e.y+e.h<pl.y+pl.h+14){
        e.y=pl.y-e.h;e.vy=0;e.onGround=true;
      }
    }
    // if somehow fell into a chasm, remove cleanly
    if(e.y>H+80) e.alive=false;
  });
}

function updateItems(){
  items.forEach(it=>{
    if(!it.alive) return;
    it.vy+=GRAV;it.x+=it.vx;it.y+=it.vy;
    for(let pl of platforms){
      if(pl._destroy) continue;
      if(it.x+it.w>pl.x&&it.x<pl.x+pl.w&&it.vy>=0&&it.y+it.h>pl.y&&it.y+it.h<pl.y+pl.h+10){it.y=pl.y-it.h;it.vy=0;}
    }
    if(it.x<0||it.x+it.w>lvlData.width) it.vx*=-1;
    if(it.y>H+80){it.alive=false;return;}
    [p1,p2].forEach(p=>{
      if(!p.dead&&p.respawnTimer===0&&it.alive&&p.x<it.x+it.w&&p.x+p.w>it.x&&p.y<it.y+it.h&&p.y+p.h>it.y){
        it.alive=false;
        if(it.type==='mushroom'){
          if(!p.big){
            p.big=true;p.h=34;
            fTxt(it.x,it.y-20,'BIG! +EXTRA LIFE!','#ff6b6b');
            spawnParts(it.x+12,it.y,'#ff6b6b',10);
          } else {
            // already big — award a life instead
            if(p.lives<MAX_LIVES){p.lives++;fTxt(it.x,it.y-20,'+1 LIFE! ❤️','#ff6b6b');}
            else fTxt(it.x,it.y-20,'FULL LIVES!','#ff6b6b');
          }
          updateHUD();
        }
      }
    });
  });
}

function checkEnemies(p){
  if(p.dead||p.invTimer>0||p.respawnTimer>0) return;
  enemies.forEach(e=>{
    if(!e.alive||e.stomped) return;
    if(p.x+p.w>e.x&&p.x<e.x+e.w&&p.y+p.h>e.y&&p.y<e.y+e.h){
      if(p.y+p.h<e.y+e.h*0.55&&p.vy>0){
        if(e.type==='koopa'&&!e.shell){e.shell=true;e.shellTimer=280;e.vx=0;}
        else{e.stomped=true;e.alive=false;}
        p.vy=STOMP_VY;p.coins+=2;updateHUD();
        fTxt(e.x+14,e.y-10,'STOMP! +2🪙','#ffe66d');spawnParts(e.x+14,e.y,'#a0522d',7);
      } else hurtPlayer(p,false);
    }
  });
}

function checkCoins(p){
  if(p.dead||p.respawnTimer>0) return;
  coins.forEach(c=>{
    if(!c.collected&&p.x<c.x+c.r&&p.x+p.w>c.x-c.r&&p.y<c.y+c.r&&p.y+p.h>c.y-c.r){
      c.collected=true;spawnParts(c.x,c.y,'#ffe66d',5);p.coins++;updateHUD();fTxt(c.x,c.y-10,'+1🪙','#ffe66d');
    }
  });
}

function updateSigns(){
  signs.forEach(s=>{
    let near=(p1&&!p1.dead&&p1.x>s.triggerX)||(p2&&!p2.dead&&p2.x>s.triggerX);
    if(near) s.shown=true;
    if(s.shown) s.alpha=Math.min(1,(s.alpha||0)+0.04);
  });
}

function spawnParts(x,y,color,n){for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*4,vy:-Math.random()*3-1,life:35,max:35,color});}
function updateParts(){particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});}
function fTxt(x,y,text,color){floatingTexts.push({x,y,text,color,life:90});}
function updateFTxt(){floatingTexts=floatingTexts.filter(t=>t.life>0);floatingTexts.forEach(t=>{t.y-=0.35;t.life--;});}

// ── draw world ──
function drawWorld(camOffX,clipX,clipW){
  ctx.save();
  ctx.beginPath();ctx.rect(clipX,0,clipW,H);ctx.clip();
  ctx.translate(-camOffX+clipX,0);

  // platforms
  platforms.forEach(pl=>{
    if(pl._destroy) return;
    let dy=pl.y;
    if(pl._bumpTimer>0){dy=pl._origY-Math.sin((12-pl._bumpTimer)/12*Math.PI)*7;pl._bumpTimer--;}
    drawPlatform(pl,pl.x,dy);
  });
  platforms=platforms.filter(p=>!p._destroy);

  // coins
  coins.forEach(c=>{
    if(c.collected) return;
    let bob=Math.sin(frameCount/20+c.x)*2.5;
    ctx.fillStyle='#ffe66d';ctx.beginPath();ctx.arc(c.x,c.y+bob,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(c.x-2,c.y+bob-2,c.r*.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#cc9900';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(c.x,c.y+bob,c.r,0,Math.PI*2);ctx.stroke();
  });

  // sky banners
  signs.forEach(s=>{
    if(!s.shown||!s.alpha) return;
    let dx=s.x,by=s.y;
    let visX=dx-camOffX+clipX;
    if(visX<clipX-160||visX>clipX+clipW+160) return;
    let bw=148,bh=s.lines.length*20+54,bx=dx-bw/2;
    ctx.globalAlpha=s.alpha;
    let cols={walk:'#4ecdc4',jump:'#ffe66d',coin:'#ffd700',block:'#ff9f43',mush:'#e84393',big:'#a29bfe',stomp:'#ff6b6b',flag:'#a29bfe'};
    let darks={walk:'#00897b',jump:'#c8950a',coin:'#8B6000',block:'#e65100',mush:'#9b0058',big:'#4a3ab5',stomp:'#c0392b',flag:'#6c5ce7'};
    let col=cols[s.icon]||'#fff',dark=darks[s.icon]||'#333';
    // glow ring
    ctx.shadowColor=col;ctx.shadowBlur=12;
    ctx.fillStyle=col;ctx.beginPath();roundRect(ctx,bx,by,bw,bh,10);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=dark;ctx.lineWidth=2.5;ctx.beginPath();roundRect(ctx,bx,by,bw,bh,10);ctx.stroke();
    // pointer
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(dx-10,by+bh);ctx.lineTo(dx+10,by+bh);ctx.lineTo(dx,by+bh+14);ctx.closePath();ctx.fill();
    ctx.strokeStyle=dark;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(dx-10,by+bh);ctx.lineTo(dx,by+bh+14);ctx.lineTo(dx+10,by+bh);ctx.stroke();
    // icon
    let icons={walk:'👣',jump:'⬆',coin:'🪙',block:'❓',mush:'🍄',big:'⭐',stomp:'💥',flag:'🚩'};
    ctx.font='18px serif';ctx.textAlign='center';ctx.fillText(icons[s.icon]||'★',dx,by+22);
    // divider
    ctx.strokeStyle=dark;ctx.lineWidth=1;ctx.globalAlpha=s.alpha*0.3;
    ctx.beginPath();ctx.moveTo(bx+8,by+30);ctx.lineTo(bx+bw-8,by+30);ctx.stroke();
    ctx.globalAlpha=s.alpha;
    // text
    ctx.fillStyle=dark;ctx.font='bold 11px monospace';ctx.textAlign='center';
    s.lines.forEach((ln,i)=>ctx.fillText(ln,dx,by+48+i*20));
    ctx.globalAlpha=1;ctx.textAlign='left';ctx.shadowBlur=0;
  });

  // items
  items.forEach(it=>{
    if(!it.alive) return;
    ctx.fillStyle='#dd3333';ctx.beginPath();ctx.arc(it.x+it.w/2,it.y+8,it.w/2,Math.PI,0);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(it.x+8,it.y+6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(it.x+it.w-8,it.y+6,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffe090';ctx.fillRect(it.x+4,it.y+8,it.w-8,it.h-8);
    ctx.fillStyle='#000';ctx.fillRect(it.x+8,it.y+12,3,5);ctx.fillRect(it.x+it.w-11,it.y+12,3,5);
  });

  // enemies
  enemies.forEach(e=>{
    if(!e.alive) return;
    if(e.stomped){ctx.fillStyle='#a0522d';ctx.fillRect(e.x,e.y+e.h-8,e.w,8);return;}
    if(e.type==='goomba'){
      ctx.fillStyle='#a0522d';ctx.fillRect(e.x+2,e.y+10,e.w-4,e.h-10);
      ctx.fillStyle='#c87040';ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.y+8,e.w/2,10,0,0,Math.PI*2);ctx.fill();
      let lf=Math.sin(frameCount/12)*3;
      ctx.fillStyle='#3d2000';ctx.fillRect(e.x+2,e.y+e.h,8,4+lf);ctx.fillRect(e.x+e.w-10,e.y+e.h,8,4-lf);
      ctx.fillStyle='#fff';ctx.fillRect(e.x+4,e.y+4,6,6);ctx.fillRect(e.x+e.w-10,e.y+4,6,6);
      ctx.fillStyle='#000';ctx.fillRect(e.x+5,e.y+5,4,4);ctx.fillRect(e.x+e.w-9,e.y+5,4,4);
      ctx.strokeStyle='#000';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(e.x+3,e.y+3);ctx.lineTo(e.x+10,e.y+6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(e.x+e.w-3,e.y+3);ctx.lineTo(e.x+e.w-10,e.y+6);ctx.stroke();
    } else if(e.type==='koopa'){
      if(e.shell){
        ctx.fillStyle='#3cb040';ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.y+e.h/2,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#1a5020';ctx.lineWidth=2;ctx.stroke();
        ctx.strokeStyle='#fff';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(e.x+e.w/2,e.y+4);ctx.lineTo(e.x+e.w/2,e.y+e.h-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(e.x+4,e.y+e.h/2);ctx.lineTo(e.x+e.w-4,e.y+e.h/2);ctx.stroke();
        return;
      }
      ctx.fillStyle='#3cb040';ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.y+14,e.w/2-2,10,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffe090';ctx.beginPath();ctx.ellipse(e.x+e.w/2+(e.vx<0?-6:6),e.y+4,8,9,0,0,Math.PI*2);ctx.fill();
      let ex2=e.vx<0?e.x+3:e.x+e.w-9;
      ctx.fillStyle='#000';ctx.fillRect(ex2,e.y+2,5,5);
      ctx.fillStyle='#a0522d';ctx.fillRect(e.x+2,e.y+e.h,8,5);ctx.fillRect(e.x+e.w-10,e.y+e.h,8,5);
    }
  });

  // flag
  ctx.fillStyle='#aaa';ctx.fillRect(flag.x,flag.y,4,flag.h);
  let wave=Math.sin(frameCount/18)*4;
  ctx.fillStyle=(flag.r1&&flag.r2)?'#ffe66d':'#ff4444';
  ctx.beginPath();ctx.moveTo(flag.x+4,flag.y);ctx.lineTo(flag.x+36+wave,flag.y+12);ctx.lineTo(flag.x+4,flag.y+24);ctx.fill();
  ctx.fillStyle='#777';ctx.fillRect(flag.x-8,flag.y+flag.h-6,22,8);

  // players
  [p1,p2].forEach(p=>{
    // respawn ghost effect
    if(p.respawnTimer>0){
      let flash=Math.floor(p.respawnTimer/10)%2===0;
      if(!flash) return;
      ctx.globalAlpha=0.4;
      drawPlayerShape(p);
      // respawn countdown ring
      let prog=1-(p.respawnTimer/RESPAWN_TIME);
      ctx.strokeStyle=p.color;ctx.lineWidth=3;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.arc(p.respawnX+p.w/2,p.respawnY+p.h/2,22,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
      return;
    }
    if(p.dead) return;
    if(p.invTimer>0&&Math.floor(p.invTimer/5)%2===0) return;
    ctx.globalAlpha=1;
    drawPlayerShape(p);
  });
  ctx.globalAlpha=1;

  // floating texts (world space)
  floatingTexts.forEach(t=>{
    ctx.globalAlpha=Math.min(1,t.life/25);
    ctx.fillStyle=t.color;ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText(t.text,t.x,t.y);
  });
  ctx.globalAlpha=1;ctx.textAlign='left';

  // particles
  particles.forEach(pt=>{
    ctx.globalAlpha=pt.life/pt.max;ctx.fillStyle=pt.color;ctx.fillRect(pt.x-2,pt.y-2,5,5);
  });
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawPlayerShape(p){
  let bh=p.big?34:28;
  let leg=p.onGround?Math.sin(p.frame*Math.PI)*3.5:0;
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(p.x+p.w/2,p.y+bh+2,11,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p.color;ctx.fillRect(p.x+2,p.y+(bh-18),p.w-4,18);
  ctx.fillStyle=p.pants;ctx.fillRect(p.x+4,p.y+(bh-10),p.w-8,10);
  ctx.fillStyle=p.color;
  ctx.fillRect(p.x+3,p.y+bh,8,5+leg);ctx.fillRect(p.x+p.w-11,p.y+bh,8,5-leg);
  ctx.fillStyle='#3d2b00';
  ctx.fillRect(p.x+1,p.y+bh+leg,10,5);ctx.fillRect(p.x+p.w-11,p.y+bh-leg,10,5);
  ctx.fillStyle=p.color;ctx.fillRect(p.x+2,p.y,p.w-4,bh-12);
  ctx.fillStyle=p.hat;ctx.fillRect(p.x,p.y+4,p.w,6);ctx.fillRect(p.x+4,p.y-4,p.w-8,10);
  if(p.big){ctx.fillStyle=p.hat;ctx.fillRect(p.x+4,p.y-8,p.w-8,6);}
  let ex=p.dir>0?p.x+p.w-10:p.x+4;
  ctx.fillStyle='#fff';ctx.fillRect(ex,p.y+3,6,5);
  ctx.fillStyle='#000';ctx.fillRect(ex+(p.dir>0?2:0),p.y+4,3,3);
  ctx.fillStyle='#3d2b00';ctx.fillRect(p.x+5,p.y+9,p.w-10,3);
}

function drawPlatform(pl,dx,dy){
  if(pl.t==='ground'){
    ctx.fillStyle='#5ba020';ctx.fillRect(dx,dy,pl.w,14);
    ctx.fillStyle='#8B4513';ctx.fillRect(dx,dy+14,pl.w,pl.h-14);
    ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
    for(let bx=0;bx<pl.w;bx+=20) ctx.strokeRect(dx+bx,dy+14,20,pl.h-14);
  } else if(pl.t==='brick'){
    ctx.fillStyle='#c84c0c';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.fillStyle='rgba(0,0,0,0.22)';
    for(let row=0;row<pl.h;row+=16){let off=row%32===0?0:8;for(let col=0;col<pl.w;col+=16) ctx.fillRect(dx+col+off%pl.w,dy+row,14,14);}
    ctx.strokeStyle='#7a2c06';ctx.lineWidth=1;ctx.strokeRect(dx,dy,pl.w,pl.h);
  } else if(pl.t==='question'){
    let pulse=Math.sin(frameCount/10)*0.12+0.88;
    ctx.fillStyle=`rgba(255,200,0,${pulse})`;ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.fillStyle='#fff';ctx.font='bold 18px serif';ctx.textAlign='center';
    ctx.fillText('?',dx+pl.w/2,dy+pl.h-6);ctx.textAlign='left';
    ctx.strokeStyle='#8B6000';ctx.lineWidth=1.5;ctx.strokeRect(dx,dy,pl.w,pl.h);
  } else if(pl.t==='used'){
    ctx.fillStyle='#888';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(dx,dy,pl.w,pl.h);
  } else if(pl.t==='solid'){
    ctx.fillStyle='#e0c070';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.strokeStyle='#b09040';ctx.lineWidth=1;
    for(let bx=0;bx<pl.w;bx+=16) for(let by=0;by<pl.h;by+=16) ctx.strokeRect(dx+bx,dy+by,16,16);
  } else if(pl.t==='pipe'){
    ctx.fillStyle='#3cb040';ctx.fillRect(dx,dy,pl.w,pl.h);
    ctx.fillStyle='#2a8030';ctx.fillRect(dx+pl.w*0.55,dy,pl.w*0.3,pl.h);
    ctx.fillStyle='#3cb040';ctx.fillRect(dx-4,dy,pl.w+8,16);
    ctx.fillStyle='#2a8030';ctx.fillRect(dx+pl.w*0.55-2,dy,pl.w*0.3,16);
    ctx.strokeStyle='#1a5020';ctx.lineWidth=1.5;ctx.strokeRect(dx-4,dy,pl.w+8,16);ctx.strokeRect(dx,dy,pl.w,pl.h);
  }
}

function drawBg(camOff,clipX,clipW){
  ctx.save();ctx.beginPath();ctx.rect(clipX,0,clipW,H);ctx.clip();
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,lvlData.bg[0]);g.addColorStop(1,lvlData.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(clipX,0,clipW,H);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[80,50,45],[240,34,38],[490,58,52],[660,40,40],[860,54,47],[1100,36,42]].forEach(([cx,cy,r])=>{
    let ax=((cx-camOff*0.28)%W+W)%W+clipX;
    ctx.beginPath();ctx.arc(ax,cy,r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ax+r*.6,cy+8,r*.7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ax-r*.6,cy+8,r*.7,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

function drawHUD(){
  if(splitBlend>0){
    let dw=Math.round(4*splitBlend);
    ctx.fillStyle='#000';ctx.fillRect(W/2-dw/2,0,dw,H);
    ctx.font='bold 11px monospace';
    ctx.fillStyle=p1.color;ctx.fillText('P1',4,H-6);
    ctx.fillStyle=p2.color;ctx.fillText('P2',W/2+4,H-6);
  }
  let fdx=flag.x-camX;
  if(!splitMode&&fdx>W-10){ctx.fillStyle='#ffe66d';ctx.font='bold 14px monospace';ctx.fillText('FLAG ▶',W-90,26);}
  if(flag.r1){ctx.fillStyle='#ff6b6b';ctx.font='13px monospace';ctx.fillText('P1✓',8,26);}
  if(flag.r2){ctx.fillStyle='#4ecdc4';ctx.font='13px monospace';ctx.fillText('P2✓',46,26);}
}

function updateHUD(){
  document.getElementById('p1coins').textContent=p1.coins;
  document.getElementById('p2coins').textContent=p2.coins;
  document.getElementById('p1lives').textContent='❤️'.repeat(Math.max(0,p1.lives));
  document.getElementById('p2lives').textContent='❤️'.repeat(Math.max(0,p2.lives));
  document.getElementById('p1size').textContent=p1.big?'⭐':'';
  document.getElementById('p2size').textContent=p2.big?'⭐':'';
  document.getElementById('lvlDisp').textContent=lvlData?lvlData.name:'...';
}

function doRestart(){
  level=0;
  resetGame();state='playing';
  document.getElementById('overlay').style.display='none';
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function doNextLevel(){
  if(level<levels.length-1){level++;initLevel(level,false);}
  else resetGame();
  state='playing';
  document.getElementById('overlay').style.display='none';
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function showOverlay(t,m,s,showBtn,showNext){
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ctrlInfo').style.display='none';
  document.getElementById('oTitle').textContent=t;
  document.getElementById('oMsg').textContent=m;
  document.getElementById('startMsg').textContent=s;
  document.getElementById('restartBtn').style.display=showBtn?'inline-block':'none';
  document.getElementById('nextBtn').style.display=showNext?'inline-block':'none';
}

document.addEventListener('keydown',e=>{
  if(!keys[e.key]) kTime[e.key]=Date.now();
  keys[e.key]=true;
  if(state==='title'){
    let both1=keys['ArrowLeft']&&keys['ArrowRight'];
    let both2=keys['a']&&keys['d']||keys['A']&&keys['D'];
    if(both1||both2){state='playing';document.getElementById('overlay').style.display='none';}
  }
  if((state==='win'||state==='dead')&&['ArrowLeft','ArrowRight','a','d','A','D'].includes(e.key)){
    if(state==='win'&&level<levels.length-1){level++;initLevel(level,false);state='playing';document.getElementById('overlay').style.display='none';document.getElementById('restartBtn').style.display='none';document.getElementById('nextBtn').style.display='none';}
    else if(state==='dead'){resetGame();state='playing';document.getElementById('overlay').style.display='none';document.getElementById('restartBtn').style.display='none';document.getElementById('nextBtn').style.display='none';}
    // if state==='win' and on last level, do nothing — wait for button click
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function loop(){
  frameCount++;
  ctx.clearRect(0,0,W,H);

  if(state==='playing'){
    updatePlayer(p1,'ArrowLeft','ArrowRight');
    updatePlayer(p2,'a','d');
    updateEnemies();updateItems();updateSigns();
    checkEnemies(p1);checkEnemies(p2);
    checkCoins(p1);checkCoins(p2);
    updateCamera();updateParts();updateFTxt();

    // flag check — only alive non-respawning players
    if(!p1.dead&&p1.respawnTimer===0&&p1.x+p1.w>flag.x&&p1.x<flag.x+20&&p1.y+p1.h>flag.y&&p1.y<flag.y+flag.h) flag.r1=true;
    if(!p2.dead&&p2.respawnTimer===0&&p2.x+p2.w>flag.x&&p2.x<flag.x+20&&p2.y+p2.h>flag.y&&p2.y<flag.y+flag.h) flag.r2=true;

    let bothAtFlag=flag.r1&&flag.r2;
    let gameOver=(p1.dead&&p1.lives<=0)||(p2.dead&&p2.lives<=0);

    if(bothAtFlag){
      state='win';
      if(level===levels.length-1){
        // final win screen — no auto-advance
        showOverlay('🏆 CONGRATULATIONS! 🏆',
          `Amazing teamwork! Coins collected: ${p1.coins+p2.coins}🪙`,
          '', false, false);
        document.getElementById('restartBtn').style.display='inline-block';
        document.getElementById('nextBtn').style.display='none';
      } else {
        showOverlay('🎉 '+(level===0?'TUTORIAL DONE!':'LEVEL CLEAR!'),
          level===0?'You know the ropes — time for the real thing!':`Coins: ${p1.coins+p2.coins}🪙  P1 ❤️${p1.lives}  P2 ❤️${p2.lives}`,
          'Stomp both arrows for next level!', true, true);
      }
    }
    if(gameOver) showOverlay('💀 GAME OVER','You ran out of lives!','Stomp both arrows to retry!',true,false),state='dead';
  }

  if(splitBlend<0.01){
    drawBg(camX,0,W);drawWorld(camX,0,W);
  } else if(splitBlend>0.99){
    let hw=Math.floor(W/2)-2;
    drawBg(cam1X,0,hw);drawWorld(cam1X,0,hw);
    drawBg(cam2X,hw+4,hw);drawWorld(cam2X,hw+4,hw);
  } else {
    let hw=Math.floor(W/2)-2;
    ctx.globalAlpha=1-splitBlend;drawBg(camX,0,W);drawWorld(camX,0,W);
    ctx.globalAlpha=splitBlend;
    drawBg(cam1X,0,hw);drawWorld(cam1X,0,hw);
    drawBg(cam2X,hw+4,hw);drawWorld(cam2X,hw+4,hw);
    ctx.globalAlpha=1;
  }

  if(state==='playing') drawHUD();
  requestAnimationFrame(loop);
}

resetGame();
showOverlay('Super Makey Makey Bros.','Work together and reach the FLAG to win!','Stomp both arrows to start!');
document.getElementById('ctrlInfo').style.display='block';
loop();
</script>
